# Build the edgar-mcp image with kaniko and push to the GitLab registry.
# Deploy is GitOps via gitops/apps/edgar-mcp (ArgoCD) with a PINNED
# $CI_COMMIT_SHORT_SHA tag — never :latest (registry-restart SPOF).

stages:
  - build

variables:
  IMAGE: $CI_REGISTRY/michaeltabet/edgar-mcp

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
        --context "$CI_PROJECT_DIR"
        --dockerfile "$CI_PROJECT_DIR/Dockerfile"
        --destination "$IMAGE:$CI_COMMIT_SHORT_SHA"
        --snapshot-mode=redo
    - echo "Pushed $IMAGE:$CI_COMMIT_SHORT_SHA"
